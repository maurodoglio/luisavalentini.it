{% extends "base.html" %}

{% block title %}{{ mostra.name }} - Luisa Valentini{% endblock %}

{% block content %}
<article class="mostra-detail">
    <h2>{{ mostra.name }}</h2>
    <p class="mostra-date">{{ mostra.beginning|date:"d/m/Y" }}</p>
    <p class="mostra-type">{{ mostra.get_type_display }}</p>
    <div class="description">{{ mostra.content|safe }}</div>
</article>
{% endblock %}
