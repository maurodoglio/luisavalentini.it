{% extends "base.html" %}

{% block title %}{{ typology }} - Luisa Valentini{% endblock %}

{% block content %}
<h2>{{ typology }}</h2>
<div class="opere-grid">
    {% for opera in opere %}
    <div class="opera-card">
        <a href="{{ opera.get_absolute_url }}">
            {% if opera.thumb %}
            <img src="{{ opera.thumb.url }}" alt="{{ opera.title }}">
            {% endif %}
            <h3>{{ opera.title }}</h3>
            <span class="year">{{ opera.creation_year }}</span>
        </a>
    </div>
    {% empty %}
    <p>Nessuna opera disponibile.</p>
    {% endfor %}
</div>
{% endblock %}
