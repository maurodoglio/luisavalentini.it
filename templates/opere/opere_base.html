{% extends "base.html" %}

{% block title %}{{ typology }}{% endblock %}
{% block page_title %}{{ typology }}{% endblock %}

{% block content %}
<ul id="elenco_opere">
    {% for opera in opere %}
    <li>
        <a href="{{ opera.image.url }}" title="{{ opera.title }} {{ opera.content }}">
            {% if opera.thumb %}
            <img width="100" height="65" src="{{ opera.thumb.url }}" alt="{{ opera.title }}">
            {% endif %}
        </a>
    </li>
    {% empty %}
    <li>Nessuna opera disponibile.</li>
    {% endfor %}
</ul>
{% endblock %}
